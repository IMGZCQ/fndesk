<body>
<div class="container">
  <div id="background"></div>
  <div id="player" style="padding:12px">
    <div class="player-content">
      <div class="cover"></div>
      <div class="player-info">
        <div class="tag">
          <strong>Title</strong>
          <span class="artist">Artist</span>
          <span class="album">Album</span>
        </div>
        <div class="control">
          <div class="left">
            <div class="rewind icon" title="上一曲"><i class="fas fa-step-backward"></i></div>
            <div class="playback icon" title="播放/暂停"><i class="fas fa-play"></i></div>
            <div class="fastforward icon" title="下一曲"><i class="fas fa-step-forward"></i></div>
          </div>
          <div class="volume right">
            <div class="mute icon" title="音量"><i class="fas fa-volume-up"></i></div>
            <div class="slider">
              <div class="pace"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="slider">
        <div class="loaded"></div>
        <div class="pace"></div>
      </div>
      <div class="progress-info">
        <div class="timer left">0:00</div>
        <div class="right controls">
          <select id="theme-select" class="theme-select">
            <option value="default">科技蓝</option>
            <option value="pink">猛男粉</option>
            <option value="blackgold">酷黑金</option>
            <option value="rainbow">缤纷彩</option>
            <option value="purple">梦幻紫</option>
            <option value="gundam">红白蓝</option>
          </select>
          <div class="logout icon" title="退出登录">退</div>
          <div class="repeat icon" title="循环播放"><i class="fas fa-repeat"></i></div>
          <div class="shuffle icon" title="随机播放"><i class="fas fa-shuffle"></i></div>
          <div class="lyrics-toggle icon" title="显示/隐藏歌词">词</div>
        </div>
      </div>
    </div>
    <audio id="audio" preload="auto" playsinline></audio>
    
    <div class="lyrics-container">
      <div class="lyrics-line current"></div>
      <div class="lyrics-line next"></div>
    </div>
  </div>
  
  <div class="page-alert" id="player-alert" style="display:none">
    <span>播放器当前为残血模式,因不可抗力无法在飞牛v1.1.15后使用飞牛端口5666(不登录飞牛)直接播放,请使用Fndesk端口(默认:9990/MP3go/player.html)来访问使用,需自行端口穿透映射,望理解！</span>
    <span class="close-btn" onclick='this.parentElement.style.display="none"'>❌</span>
  </div>

  <ul id="playlist"></ul>
</div>

<script src="js/jsmediatags.min.js"></script>
<script src="js/jquery-ui-1.8.17.custom.min.js"></script>
<script src="js/script_player.js"></script>
<script>window.playerIcon=null;fetch("/deskdata/fnstyle.json?v="+(new Date).getTime()).then(e=>e.json()).then(e=>{if(e.fndeskMP3_name){document.title=e.fndeskMP3_name}const t=document.querySelector('link[rel="icon"]');if(t&&e.fndeskMP3_ico){t.href=e.fndeskMP3_ico;window.playerIcon=e.fndeskMP3_ico}}).catch(e=>{console.error("Failed to fetch fnstyle.json:",e)});document.addEventListener("DOMContentLoaded",function(){const n=document.getElementById("theme-select");const o=["default","pink","blackgold","rainbow","purple","gundam"];const e=localStorage.getItem("musicPlayerTheme");const t=function(e){const t=o.indexOf(e)!==-1?e:"blackgold";document.body.setAttribute("data-theme",t);if(n){n.value=t}localStorage.setItem("musicPlayerTheme",t)};if(n){t(e||"blackgold");n.addEventListener("change",function(){t(n.value)})}else if(e){document.body.setAttribute("data-theme",o.indexOf(e)!==-1?e:"blackgold")}else{document.body.setAttribute("data-theme","blackgold")}const c=document.querySelector(".logout");if(c){c.addEventListener("click",function(){localStorage.removeItem("musicPlayerAuthenticated");localStorage.removeItem("musicPlayerAuthExpiration");window.location.href="login.html"})}});if("serviceWorker"in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
</body>
