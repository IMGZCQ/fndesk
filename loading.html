<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>飞牛桌面管理工具 - 加载中</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="./fonts/font-awesome.min.css" rel="stylesheet">
    <style>:root{--primary-color:#0a192f;--secondary-color:#112240;--accent-color:#00aeff;--text-primary:#e6f1ff;--text-secondary:#e6f1ff;--border-color:#233554;--highlight-color:#4cc9f0;--error-color:#f87171;--success-color:#4ade80;--card-bg:rgba(9, 20, 37, 0.8);--input-bg:rgba(10, 25, 47, 0.7)}*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}body{min-height:100vh;background-color:var(--primary-color);background-size:cover;background-position:center;background-repeat:no-repeat;color:var(--text-primary);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden}body::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(100,255,218,.05) 0,rgba(30,41,59,0) 70%);pointer-events:none}.loading-container{background:rgba(7,0,102,.226);backdrop-filter:blur(3px);border:1px solid var(--border-color);border-radius:8px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 1px rgba(100,255,218,.1);position:relative;z-index:1;overflow:hidden;transition:all .3s ease,transform .3s ease,box-shadow .3s ease;display:flex;flex-direction:column;align-items:center;gap:1.5rem}.loading-container:hover{background:var(--card-bg);backdrop-filter:blur(10px)}.loading-container::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-color),transparent)}.loading-container:hover{transform:translateY(-5px);box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 0 1px rgba(100,255,218,.2),0 0 30px rgba(100,255,218,.1)}.loading-header{text-align:center}.loading-title{font-size:2rem;color:var(--accent-color);margin-bottom:.5rem;letter-spacing:1px;text-shadow:0 0 10px rgba(100,255,218,.3)}.main-container{display:flex;justify-content:center;align-items:center;height:100%;width:100%;transform:scale(3);transform-origin:center;margin:15px 0}.loader{width:100%;max-width:200px}.trace-bg{stroke:#252525;stroke-width:1.8;fill:none}.trace-flow{stroke-width:1.8;fill:none;stroke-dasharray:40 400;stroke-dashoffset:438;filter:drop-shadow(0 0 6px currentColor);animation:flow 3s cubic-bezier(.5,0,.9,1) infinite}.blue2{stroke:var(--accent-color);color:var(--accent-color)}.blue{stroke:var(--highlight-color);color:var(--highlight-color)}@keyframes flow{to{stroke-dashoffset:0}}.loading-progress{width:320px;height:12px;background-color:var(--border-color);border-radius:6px;overflow:hidden;margin:1rem 0}.loading-bar{height:100%;background:linear-gradient(90deg,var(--accent-color),var(--highlight-color));border-radius:3px;width:0%;animation:progress 2s ease-in-out infinite}@keyframes progress{0%{width:0%}50%{width:70%}100%{width:100%}}.loading-text{color:var(--text-secondary);font-size:1.1rem;font-weight:700;text-align:center;line-height:1.5;margin-top:10px}.mismatch-container{display:none;flex-direction:column;align-items:center;gap:1rem;text-align:center}.mismatch-buttons{display:flex;gap:1rem;justify-content:center;width:100%}.mismatch-text{color:var(--error-color);font-size:1.2em;font-weight:700;line-height:1.6}.btn-know{padding:.6rem 1.5rem;background:var(--accent-color);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;transition:all .2s}.btn-know:hover{background:var(--highlight-color);transform:scale(1.05)}.btn-force{padding:.6rem 1.5rem;background:var(--error-color);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;transition:all .2s;font-size:.9rem;opacity:.8}.btn-force:hover{background:#ef4444;transform:scale(1.05);opacity:1}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:1000;justify-content:center;align-items:center}.modal-content{background:var(--secondary-color);border:1px solid var(--border-color);border-radius:8px;padding:2rem;max-width:320px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:modalFadeIn .3s ease-out}@keyframes modalFadeIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}.modal-message{margin-bottom:1.5rem;line-height:1.6;color:var(--text-primary);font-size:1rem}.modal-buttons{display:flex;gap:1rem;justify-content:center}.modal-btn{padding:.5rem 1.5rem;border-radius:4px;cursor:pointer;font-weight:600;border:none;transition:all .2s;font-size:.9rem}.btn-cancel{background:rgba(255,255,255,.1);color:var(--text-secondary)}.btn-confirm{background:var(--error-color);color:#fff}.modal-btn:hover{transform:scale(1.05);filter:brightness(1.2)}.system-info{margin-top:1rem;text-align:center;font-size:.8rem;opacity:.8}@media (max-width:768px){.loading-container{margin:1rem;padding:2rem;width:calc(100% - 2rem);max-width:400px}.loading-title{font-size:1.75rem}.loader{max-width:150px}}</style>
</head>

<body>
    <div id="loading-container" class="loading-container">
        <div class="loading-header">
            <h1 class="loading-title">飞牛桌面管理工具</h1>
        </div>

        <div id="normal-loading">
            <div class="main-container">
                <div class="loader">
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="chipGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#2d2d2d"></stop>
                                <stop offset="100%" stop-color="#0f0f0f"></stop>
                            </linearGradient>
                            <linearGradient id="textGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#eeeeee"></stop>
                                <stop offset="100%" stop-color="#888888"></stop>
                            </linearGradient>
                            <linearGradient id="pinGradient" x1="1" y1="0" x2="0" y2="0">
                                <stop offset="0%" stop-color="#bbbbbb"></stop>
                                <stop offset="50%" stop-color="#888888"></stop>
                                <stop offset="100%" stop-color="#555555"></stop>
                            </linearGradient>
                        </defs>

                        
                        <g id="traces">
                            
                            <path d="M230 150 H300 V210 H326" class="trace-bg"></path>
                            <path d="M230 150 H300 V210 H326" class="trace-flow blue2"></path>

                            <path d="M210 180 H280 V230 H326" class="trace-bg"></path>
                            <path d="M210 180 H280 V230 H326" class="trace-flow blue"></path>

                            <path d="M190 260 H250 V250 H326" class="trace-bg"></path>
                            <path d="M190 260 H250 V250 H326" class="trace-flow blue2"></path>

                            <path d="M230 310 H300 V270 H326" class="trace-bg"></path>
                            <path d="M230 310 H300 V270 H326" class="trace-flow blue"></path>

                            
                            <path d="M570 140 H510 V210 H474" class="trace-bg"></path>
                            <path d="M570 140 H510 V210 H474" class="trace-flow blue"></path>

                            <path d="M590 190 H530 V230 H474" class="trace-bg"></path>
                            <path d="M590 190 H530 V230 H474" class="trace-flow blue2"></path>

                            <path d="M580 250 H540 V250 H474" class="trace-bg"></path>
                            <path d="M580 250 H540 V250 H474" class="trace-flow blue"></path>

                            <path d="M570 300 H520 V270 H474" class="trace-bg"></path>
                            <path d="M570 300 H520 V270 H474" class="trace-flow blue2"></path>
                        </g>

                        <rect x="330" y="190" width="140" height="100" rx="20" ry="20" fill="url(#chipGradient)" stroke="#222" stroke-width="3" filter="drop-shadow(0 0 6px rgba(0,0,0,0.8))"></rect>

                        <g>
                            <rect x="322" y="205" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="322" y="225" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="322" y="245" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="322" y="265" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        </g>
                        <g>
                            <rect x="470" y="205" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="470" y="225" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="470" y="245" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                            <rect x="470" y="265" width="8" height="10" fill="url(#pinGradient)" rx="2"></rect>
                        </g>

                        <text x="400" y="240" font-family="Arial, sans-serif" font-size="32" fill="url(#textGradient)" text-anchor="middle" alignment-baseline="middle">
                            fnOS
                        </text>

                        
                        <circle cx="230" cy="150" r="5" fill="black"></circle>
                        <circle cx="210" cy="180" r="5" fill="black"></circle>
                        <circle cx="190" cy="260" r="5" fill="black"></circle>
                        <circle cx="230" cy="310" r="5" fill="black"></circle>

                        <circle cx="570" cy="140" r="5" fill="black"></circle>
                        <circle cx="590" cy="190" r="5" fill="black"></circle>
                        <circle cx="580" cy="250" r="5" fill="black"></circle>
                        <circle cx="570" cy="300" r="5" fill="black"></circle>
                    </svg>                </div>
            </div>

            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
            <div class="loading-text">
                请稍候...正在初始化：<br>
                1.系统启动不足三分钟<br>
                2.正在配置个性化设置<br>
                3.正在升级Fndesk程序
            </div>
        </div>

        <div id="mismatch-loading" class="mismatch-container">
            <div class="mismatch-text">
                此飞牛版本未经作者核验适配<br>
                暂时关闭生效入口，待确认开放！
            </div>
            <div class="mismatch-buttons">
                <button class="btn-force" onclick="confirmForceExecute()">强制执行</button>
                <button class="btn-know" onclick="forceReady()">稍后再试</button>
            </div>
        </div>

        <div class="system-info">
            by 米恋泥 @小宠瞭望塔
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-message">若执行后发生不兼容的情况，可以随时使用一键还原恢复默认状态</div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeConfirmModal()">我在想想</button>
                <button class="modal-btn btn-confirm" onclick="doForceExecute()">直接执行</button>
            </div>
        </div>
    </div>

    <script>const backgroundApiUrl_img="https://t.alcy.cc/fj";const backgroundApiUrl_video="https://t.alcy.cc/acg";document.body.style.backgroundImage=`url('${backgroundApiUrl_img}')`;document.addEventListener("DOMContentLoaded",function(){function e(){const e=document.createElement("video");e.src=backgroundApiUrl_video;e.autoplay=true;e.muted=true;e.loop=true;e.playsInline=true;e.style.position="fixed";e.style.top="0";e.style.left="0";e.style.width="100%";e.style.height="100%";e.style.objectFit="cover";e.style.zIndex="0";e.style.opacity="0";e.style.transition="opacity 3s ease";e.oncanplay=function(){e.style.opacity="1"};e.onerror=function(){console.warn("视频加载失败，保持显示背景图");e.remove()};document.body.appendChild(e)}setTimeout(e,2e3);function t(){fetch("./api/system-status",{method:"GET"}).then(e=>{if(e.ok)return e.json();throw new Error("系统未就绪")}).then(e=>{if(e.ready==="true"){const o=e.targetUrl||"index.html";let t=false;try{t=!!window.parent.document.getElementById("root")}catch(e){t=false}if(t){window.location.href=o}else{window.parent.location.href=o}}else if(e.ready==="unver"){document.getElementById("normal-loading").style.display="none";document.getElementById("mismatch-loading").style.display="flex"}else{setTimeout(t,3e3)}}).catch(()=>{setTimeout(t,3e3)})}window.forceReady=function(){fetch("./api/force-ready",{method:"POST"}).then(e=>e.json()).then(e=>{if(e.success)t()})};window.confirmForceExecute=function(){document.getElementById("confirm-modal").style.display="flex"};window.closeConfirmModal=function(){document.getElementById("confirm-modal").style.display="none"};window.doForceExecute=async function(){closeConfirmModal();document.getElementById("loading-container").style.display="none";const e=localStorage.getItem("authToken")||"authenticated";try{await fetch("./api/force-ready",{method:"POST",headers:{"x-auth-token":e}});fetch("./api/justgo",{method:"POST",headers:{"x-auth-token":e}}).catch(e=>console.error("justgo 触发失败:",e));setTimeout(()=>location.reload(),500)}catch(e){setTimeout(()=>location.reload(),1e3)}};setTimeout(()=>{t()},3e3)})</script>
</body>

</html>
